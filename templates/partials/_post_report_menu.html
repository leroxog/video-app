{% if user %}
    <div class="post-menu-wrap">
        <button type="button" class="post-menu-dots" data-post-id="{{ post.id }}" title="Mehr" aria-label="Mehr Optionen">
            <span class="post-menu-dot"></span>
            <span class="post-menu-dot"></span>
            <span class="post-menu-dot"></span>
        </button>
        <div class="post-menu-dropdown" style="display:none;">
            <button type="button" class="post-menu-report-btn" data-post-id="{{ post.id }}">Melden</button>
        </div>
    </div>
{% endif %}
