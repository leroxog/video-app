{% extends "base.html" %}
{% block title %}Code eingeben - timeskip{% endblock %}
{% block content %}
    <h1>Code eingeben</h1>
    <p>Gib den 6-stelligen Code ein, den du erhalten hast (gültig für 15 Minuten), und wähle ein neues Passwort.</p>
    <form action="{{ url_for('forgot_password_verify') }}" method="post" class="form">
        <label for="username">Benutzername (nur nötig, wenn dir ein Admin den Code manuell mitgeteilt hat)</label>
        <input type="text" id="username" name="username" maxlength="50">

        <label for="code">Code</label>
        <input type="text" id="code" name="code" required maxlength="6" inputmode="numeric" autocomplete="one-time-code">

        <label for="new_password">Neues Passwort</label>
        <input type="password" id="new_password" name="new_password" required>

        <label for="new_password2">Neues Passwort wiederholen</label>
        <input type="password" id="new_password2" name="new_password2" required>

        <button type="submit">Passwort ändern</button>
    </form>
    <form action="{{ url_for('forgot_password_verify') }}" method="post" class="forgot-password-resend-form">
        <input type="hidden" name="action" value="resend">
        <button type="submit" class="forgot-password-resend-btn">Neuen Code senden</button>
    </form>
{% endblock %}
