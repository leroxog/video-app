{% extends "base.html" %}
{% block title %}Passwort vergessen - timeskip{% endblock %}
{% block content %}
    <h1>Passwort oder Benutzername vergessen</h1>
    <p>Hast du eine E-Mail-Adresse bei deinem Konto hinterlegt?</p>
    <div class="forgot-password-choice">
        <a class="forgot-password-yes" href="{{ url_for('forgot_password_email') }}">Ja</a>
        <a class="forgot-password-no" href="{{ url_for('forgot_password_help') }}">Nein</a>
    </div>
{% endblock %}
