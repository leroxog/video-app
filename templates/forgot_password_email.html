{% extends "base.html" %}
{% block title %}Passwort vergessen - timeskip{% endblock %}
{% block content %}
    <h1>Code per E-Mail anfordern</h1>
    <p>Gib die E-Mail-Adresse an, die du bei deinem Konto hinterlegt hast. Wir schicken dir einen 6-stelligen Code.</p>
    <form action="{{ url_for('forgot_password_email') }}" method="post" class="form">
        <label for="email">E-Mail-Adresse</label>
        <input type="email" id="email" name="email" required maxlength="255">
        <button type="submit">Code senden</button>
    </form>
{% endblock %}
