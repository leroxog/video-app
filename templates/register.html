{% extends "base.html" %}
{% block title %}Registrieren - timeskip{% endblock %}
{% block content %}
    <h1>Registrieren</h1>
    <form action="{{ url_for('register') }}" method="post" class="form" id="registerForm">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" required maxlength="50" value="{{ form_values.username if form_values else '' }}">

        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" required>

        <label for="password2">Passwort wiederholen</label>
        <input type="password" id="password2" name="password2" required>

        <label for="birthdate">Geburtsdatum</label>
        <input type="date" id="birthdate" name="birthdate" required value="{{ form_values.birthdate if form_values else '' }}">

        <div class="kids-account-bubble" id="kidsAccountBubble" style="display:none;">
            <p>Mit dem angegebenen Alter benutzt du einen <strong>KIDS ACCOUNT</strong>!</p>
            <button type="button" id="kidsAccountAckBtn">Ich habe verstanden</button>
        </div>
        <p class="age-error" id="ageErrorNote" style="display:none;"></p>

        <label for="gender">Geschlecht</label>
        <select id="gender" name="gender" required>
            <option value="" disabled {{ '' if form_values else 'selected' }}>Bitte auswählen</option>
            {% for value, label in GENDER_CHOICES.items() %}
                <option value="{{ value }}" {{ 'selected' if form_values and form_values.gender == value else '' }}>{{ label }}</option>
            {% endfor %}
        </select>

        <label for="purpose_of_use">Wofür nutzt du den Account?</label>
        <select id="purpose_of_use" name="purpose_of_use" required>
            <option value="" disabled {{ '' if form_values else 'selected' }}>Bitte auswählen</option>
            {% for value, label in PURPOSE_CHOICES.items() %}
                <option value="{{ value }}" {{ 'selected' if form_values and form_values.purpose_of_use == value else '' }}>{{ label }}</option>
            {% endfor %}
        </select>

        <label for="country">Land</label>
        <input type="text" id="country" name="country" required maxlength="100" value="{{ form_values.country if form_values else '' }}">

        <label for="region">Bundesland</label>
        <select id="region" name="region">
            <option value="" {{ '' if form_values and form_values.region else 'selected' }}>Bitte auswählen</option>
            {% for state in REGION_CHOICES %}
                <option value="{{ state }}" {{ 'selected' if form_values and form_values.region == state else '' }}>{{ state }}</option>
            {% endfor %}
        </select>

        <label for="guardian_email" id="guardianEmailLabel">E-Mail eines Erziehungsberechtigten</label>
        <input type="email" id="guardian_email" name="guardian_email" maxlength="255" value="{{ form_values.guardian_email if form_values else '' }}">
        <p class="field-hint" id="guardianEmailHint"></p>

        <label class="checkbox-label" id="skipLastTwoWrap">
            <input type="checkbox" id="regionSkipped" name="region_skipped" value="1" {{ 'checked' if form_values and form_values.region_skipped == '1' else '' }}>
            <span id="skipLastTwoLabel">Diese letzten beiden Fragen möchte ich nicht beantworten</span>
        </label>

        <button type="submit">Konto erstellen</button>
        <p class="privacy-note">Alle Angaben werden gespeichert.</p>
    </form>
    <p>Bereits registriert? <a href="{{ url_for('login') }}">Login</a></p>

    <script>
        (function () {
            const birthdateInput = document.getElementById("birthdate");
            const bubble = document.getElementById("kidsAccountBubble");
            const ackBtn = document.getElementById("kidsAccountAckBtn");
            const ageError = document.getElementById("ageErrorNote");
            const regionSelect = document.getElementById("region");
            const guardianInput = document.getElementById("guardian_email");
            const guardianLabel = document.getElementById("guardianEmailLabel");
            const guardianHint = document.getElementById("guardianEmailHint");
            const skipLastTwo = document.getElementById("regionSkipped");
            const skipLastTwoLabel = document.getElementById("skipLastTwoLabel");
            const form = document.getElementById("registerForm");
            let acknowledged = false;

            function updateSkipUI() {
                const a = age(birthdateInput.value);
                const isKid = a !== null && a < 18;
                skipLastTwoLabel.textContent = isKid
                    ? "Diese Frage (Bundesland) möchte ich nicht beantworten"
                    : "Diese letzten beiden Fragen möchte ich nicht beantworten";
                regionSelect.disabled = skipLastTwo.checked;
                if (skipLastTwo.checked) regionSelect.value = "";
                if (isKid) {
                    // Guardian e-mail stays mandatory for kids accounts no matter what.
                    guardianInput.disabled = false;
                } else {
                    guardianInput.disabled = skipLastTwo.checked;
                    if (skipLastTwo.checked) guardianInput.value = "";
                }
            }
            skipLastTwo.addEventListener("change", updateSkipUI);

            function age(birthdateStr) {
                const b = new Date(birthdateStr);
                if (isNaN(b.getTime())) return null;
                const today = new Date();
                let a = today.getFullYear() - b.getFullYear();
                const beforeBirthday = (today.getMonth() < b.getMonth()) ||
                    (today.getMonth() === b.getMonth() && today.getDate() < b.getDate());
                if (beforeBirthday) a -= 1;
                return a;
            }

            function refresh() {
                const a = age(birthdateInput.value);
                ageError.style.display = "none";
                if (a === null) {
                    bubble.style.display = "none";
                    guardianLabel.textContent = "E-Mail eines Erziehungsberechtigten";
                    guardianHint.textContent = "";
                    return;
                }
                if (a < 10) {
                    bubble.style.display = "none";
                    ageError.textContent = "Du musst mindestens 10 Jahre alt sein, um dich zu registrieren.";
                    ageError.style.display = "block";
                } else if (a < 18) {
                    bubble.style.display = acknowledged ? "none" : "flex";
                    guardianLabel.textContent = "E-Mail eines Erziehungsberechtigten (Pflicht unter 18)";
                    guardianHint.textContent = "Für Kids-Accounts unter 18 ist diese Angabe erforderlich.";
                } else {
                    bubble.style.display = "none";
                    guardianLabel.textContent = "E-Mail (optional)";
                    guardianHint.textContent = "Empfohlen, aber nicht verpflichtend.";
                }
                updateSkipUI();
            }

            birthdateInput.addEventListener("change", () => {
                acknowledged = false;
                refresh();
            });
            ackBtn.addEventListener("click", () => {
                acknowledged = true;
                refresh();
            });

            form.addEventListener("submit", (event) => {
                const a = age(birthdateInput.value);
                if (a === null) return;
                if (a < 10) {
                    event.preventDefault();
                    refresh();
                    return;
                }
                if (a < 18 && !acknowledged) {
                    event.preventDefault();
                    bubble.style.display = "flex";
                }
            });

            refresh();
        })();
    </script>
{% endblock %}
