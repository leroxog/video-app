{% extends "base.html" %}
{% block title %}gigas/place{% endblock %}
{% block brand_text %}gigas games{% endblock %}
{% block body_class %}place-fullscreen{% endblock %}
{% block content %}
    <div class="place-page">
        <div class="place-controls" id="placeControls">
            <label for="colorPicker">Farbe:</label>
            <input type="color" id="colorPicker" value="#ff3b30">
            <span id="zoomLevel"></span>
            <span id="cooldown"></span>
            <a class="place-back" href="{{ url_for('index') }}">&larr; Zurueck</a>
        </div>

        <div class="place-canvas-wrapper" id="canvasWrapper">
            <canvas id="placeCanvas"></canvas>
        </div>
    </div>

    <script>
        const GRID_SIZE = {{ grid_size }};
        const MIN_SCALE = 3;
        const MAX_SCALE = 40;
        const COOLDOWN_MS = {{ cooldown_seconds }} * 1000;

        let scale = 6;
        let latestPixels = [];

        const controls = document.getElementById("placeControls");
        const wrapper = document.getElementById("canvasWrapper");
        const canvas = document.getElementById("placeCanvas");
        const ctx = canvas.getContext("2d");
        const colorPicker = document.getElementById("colorPicker");
        const cooldownEl = document.getElementById("cooldown");
        const zoomLevelEl = document.getElementById("zoomLevel");

        let nextAllowedAt = Date.now() + {{ cooldown_remaining }} * 1000;

        function resizeWrapper() {
            const top = wrapper.getBoundingClientRect().top;
            wrapper.style.height = Math.max(200, window.innerHeight - top) + "px";
        }

        function applyZoom(newScale, focusX, focusY) {
            const oldScale = scale;
            scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));

            const ratio = scale / oldScale;
            canvas.width = GRID_SIZE * scale;
            canvas.height = GRID_SIZE * scale;

            if (focusX !== undefined) {
                wrapper.scrollLeft = (wrapper.scrollLeft + focusX) * ratio - focusX;
                wrapper.scrollTop = (wrapper.scrollTop + focusY) * ratio - focusY;
            }

            zoomLevelEl.textContent = `${scale}x`;
            drawPixels(latestPixels);
        }

        function drawPixels(pixels) {
            latestPixels = pixels;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (const p of pixels) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x * scale, p.y * scale, scale, scale);
            }
        }

        async function loadPixels() {
            const res = await fetch("{{ url_for('place_pixels') }}");
            const pixels = await res.json();
            drawPixels(pixels);
        }

        function updateCooldownLabel() {
            const remaining = Math.ceil((nextAllowedAt - Date.now()) / 1000);
            cooldownEl.textContent = remaining > 0 ? `Naechster Pixel in ${remaining}s` : "Bereit!";
        }

        canvas.addEventListener("click", async (event) => {
            if (Date.now() < nextAllowedAt) {
                return;
            }
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((event.clientX - rect.left) / scale);
            const y = Math.floor((event.clientY - rect.top) / scale);

            const res = await fetch("{{ url_for('place_pixel') }}", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ x, y, color: colorPicker.value }),
            });
            const data = await res.json();
            if (data.ok) {
                nextAllowedAt = Date.now() + COOLDOWN_MS;
                loadPixels();
            } else if (data.error === "cooldown") {
                nextAllowedAt = Date.now() + data.retry_after * 1000;
            }
            updateCooldownLabel();
        });

        wrapper.addEventListener(
            "wheel",
            (event) => {
                event.preventDefault();
                const rect = wrapper.getBoundingClientRect();
                const focusX = event.clientX - rect.left;
                const focusY = event.clientY - rect.top;
                applyZoom(scale + (event.deltaY < 0 ? 2 : -2), focusX, focusY);
            },
            { passive: false }
        );

        window.addEventListener("resize", resizeWrapper);

        resizeWrapper();
        applyZoom(scale);
        loadPixels();
        updateCooldownLabel();
        setInterval(loadPixels, 3000);
        setInterval(updateCooldownLabel, 500);
    </script>
{% endblock %}
