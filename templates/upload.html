{% extends "base.html" %}
{% block title %}Foto hochladen - timeskip{% endblock %}
{% block content %}
    <h1>Foto hochladen</h1>
    <p class="upload-storage-note">Du kannst bis zu {{ max_photos }} Fotos gleichzeitig hochladen &mdash; sie werden gemeinsam als ein Beitrag veröffentlicht, den man im Feed durchwischen kann.</p>

    <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data" class="form" id="uploadForm">
        <label for="caption">Beschreibung (optional)</label>
        <textarea id="caption" name="caption" rows="3" maxlength="2000"></textarea>

        <label for="photos">Fotos (png, jpg, gif, webp)</label>
        <input type="file" id="photos" name="photos" accept="image/png,image/jpeg,image/gif,image/webp" multiple required>

        <div class="upload-photo-preview" id="uploadPhotoPreview"></div>

        <button type="submit" id="uploadSubmitBtn">Hochladen</button>
    </form>

    <script>
        const photosInput = document.getElementById("photos");
        const previewEl = document.getElementById("uploadPhotoPreview");

        photosInput.addEventListener("change", () => {
            previewEl.innerHTML = "";
            const files = [...photosInput.files].slice(0, {{ max_photos }});
            files.forEach((file) => {
                const img = document.createElement("img");
                img.className = "upload-photo-thumb";
                img.src = URL.createObjectURL(file);
                previewEl.appendChild(img);
            });
        });
    </script>
{% endblock %}
