{% extends "base.html" %}
{% block title %}Video hochladen - gigas{% endblock %}
{% block content %}
    <h1>Video hochladen</h1>
    <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data" class="form">
        <label for="title">Titel</label>
        <input type="text" id="title" name="title" required maxlength="200">

        <label for="description">Beschreibung (optional)</label>
        <textarea id="description" name="description" rows="4" maxlength="2000"></textarea>

        <label for="video">Videodatei (mp4, webm, ogg, mov)</label>
        <input type="file" id="video" name="video" accept="video/mp4,video/webm,video/ogg,video/quicktime" required>

        <button type="submit">Hochladen</button>
    </form>
{% endblock %}
